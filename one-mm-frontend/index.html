<head>
    <script>
        function isBitSet(number, position) {
            const mask = 1 << position;

            return (number & mask) !== 0;
        }

        function updateCheckBox(message) {
            const statusDelimiterIndex = message.findIndex(b => b === "S".charCodeAt(0))
            console.log({ statusDelimiterIndex })
            const checkboxId = message.slice(3, statusDelimiterIndex);
            const checkboxIdDecoded = new TextDecoder().decode(checkboxId);
            const checked = message[statusDelimiterIndex + 1];
            console.log({ checkboxId, checkboxIdDecoded, checked })

            const el = document.getElementById(checkboxIdDecoded);
            if (el) {
                el.checked = !!checked
            }

        }

        document.addEventListener("DOMContentLoaded", (event) => {
            console.log("DOM is fully loaded and parsed. You can now safely manipulate elements.");

            const wsuri = "ws://127.0.0.1:6969"
            const websocket = new WebSocket(wsuri)

            websocket.addEventListener("open", () => {
                console.log("Connected");
            })

            websocket.addEventListener("message", (event) => {
                console.log("received: ", event.data)
                const ds = new DecompressionStream("gzip");
                const decompressedData = new Blob([event.data]).stream().pipeThrough(ds);
                decompressedData.getReader().read()
                console.log({ decompressedData })


                new Response(decompressedData).bytes().then(
                    (uint8Array) => {
                        console.log(uint8Array)

                        if (uint8Array[0] === "I".charCodeAt(0)) {
                            console.log("Update received")
                            return updateCheckBox(uint8Array)
                        }

                        let count = 0;
                        const elements = document.querySelectorAll("input");

                        for (let i = 0; i < uint8Array.length; i++) {
                            const number = uint8Array[i]
                            for (let j = 7; j >= 0; j--) {
                                const el = elements[count];
                                if (el) {
                                    el.id = count;

                                    if (isBitSet(number, j)) {
                                        el.checked = true;
                                    }
                                }
                                count++;
                            }
                        }
                    }
                )

            })

            websocket.addEventListener("close", () => {
                console.log("Disconnected")
            })

            document.addEventListener("input", (event) => {
                console.log({ event })
                const checkboxId = Number(event.target.id);
                const status = event.target.checked;
                console.log({ checkboxId, status })
                if (!Number.isInteger(checkboxId) || isNaN(checkboxId)) return;

                //Protocolo - IXM<CHECKBOX_NUMBER>S<STATUS>
                const dataToSend = new Uint8Array([
                    ..."IXM".split("").map(c => c.charCodeAt(0)),
                    ...checkboxId.toString().split("").map(c => c.charCodeAt(0)),
                    "S".charCodeAt(0),
                    Number(status)
                ]);

                websocket.send(dataToSend)
                console.log({ dataToSend, decoded: new TextDecoder().decode(dataToSend) })

            })
        });
    </script>
    <style>
        body * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            --checkbox-margin: 8px;
            --checkbox-width: 20px;
            --checkbox-total-size: calc(var(--checkbox-width) + 2 * var(--checkbox-margin));
        }

        input {
            margin: var(--checkbox-margin);
            width: var(--checkbox-width);
            height: var(--checkbox-width);
        }

        #title {
            --title-grid-col-start-position: calc((100vw - 1044px)/var(--checkbox-total-size)/2);
            --title-grid-col-end-position: calc(var(--title-grid-col-start-position) + round(calc(1044px/var(--checkbox-total-size))));
            grid-column: var(--title-grid-col-start-position)/var(--title-grid-col-end-position);

            --font-size: 72px;
            --title-grid-row-start-position: calc((100vh - var(--font-size))/var(--checkbox-total-size)/2);
            --title-grid-row-end-position: calc(var(--title-grid-row-start-position) + round(calc(var(--font-size)/var(--checkbox-total-size))));

            width: 1044px;
            font-size: var(--font-size);
            text-wrap: nowrap;
            grid-row: var(--title-grid-row-start-position)/var(--title-grid-row-end-position);
        }

        .main-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, 36px);
            grid-template-rows: repeat(auto-fit, 36px);
        }
    </style>
